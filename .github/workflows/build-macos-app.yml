name: Build macOS .app

permissions:
  contents: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"   # or your required version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pyinstaller

    - name: Build .app with PyInstaller
      run: |
        pyinstaller --windowed --hidden-import=PIL._tkinter_finder --name AdventCalendarApp main.py

    - name: Upload .app bundle
      uses: actions/upload-artifact@v4
      with:
        name: macOS-app
        path: dist/*
    
    - name: Zip macOS app
      run: |
            cd dist
            zip -r AdventCalendarApp.zip AdventCalendarApp

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release ${{ github.run_number }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env: 
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./dist/AdventCalendarApp.zip
        asset_name: AdventCalendarApp.zip
        asset_content_type: application/zip


